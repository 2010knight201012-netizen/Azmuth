<!DOCTYPE html>
<html>
<head>
<title>WordSprint Login</title>

<style>

body{
font-family:Arial;
background:#020617;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#1e293b;
padding:40px;
border-radius:12px;
width:320px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:6px;
}

button{
width:100%;
padding:12px;
background:#22c55e;
border:none;
border-radius:6px;
color:white;
font-size:16px;
cursor:pointer;
}

a{color:#38bdf8}

</style>
</head>

<body>

<div class="box">

<h1>WordSprint</h1>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p>New player? <a href="register.html">Register</a></p>

<p id="msg"></p>

</div>

<script>

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

let db=JSON.parse(localStorage.getItem("users")||"{}")

if(!db[u] || db[u].pass!==p){

document.getElementById("msg").innerText="Invalid login"
return

}

localStorage.setItem("currentUser",u)

window.location="game.html"

}

</script>

</body>
</html>
